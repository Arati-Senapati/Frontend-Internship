<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- .items{box $}*5 -->
        <div class="items item-1-container" id="item-1">
            <div class="nested-item">Dabbe mai dabba 1 1</div>
            <div class="nested-item">Dabbe mai dabba 1 2</div>
            <div class="nested-item">Dabbe mai dabba 1 3</div>
        </div>
        <div class="items" id="item-2">box 2</div>
        <div class="items">box 3</div>
        <div class="items">box 4</div>
        <div class="items">box 5</div>
    </div>    

    <div class="grid-container">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Main Content Area</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
